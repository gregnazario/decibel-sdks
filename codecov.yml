codecov:
  require_ci_to_pass: false

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: auto
        threshold: 2%
    patch:
      default:
        target: 80%

flags:
  python-v2:
    paths:
      - decibel-sdk-python/decibel/
    carryforward: true
  rust-v2:
    paths:
      - sdk-rust-v2/src/
    carryforward: true
  rust-v1:
    paths:
      - sdk-rust/src/
    carryforward: true
  go:
    paths:
      - sdk-go/
    carryforward: true
  swift:
    paths:
      - sdk-swift/Sources/
    carryforward: true
  kotlin:
    paths:
      - sdk-kotlin/src/
    carryforward: true

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false

  after_n_builds: 2

ignore:
  - "**/*test*"
  - "**/*tests*"
  - "**/test_*"
  - "docs/**"
  - "*.md"
