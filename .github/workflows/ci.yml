name: CI

on:
  push:
    branches: [ main, "cursor/**" ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk-rust/target
          key: rust-${{ hashFiles('sdk-rust/Cargo.lock') }}
          restore-keys: rust-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Measure coverage
        run: cargo tarpaulin --out xml --output-dir coverage

      - name: Upload Rust coverage
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: sdk-rust/coverage/

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: sdk-go/go.sum

      - name: Build
        run: go build ./...

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload Go coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: sdk-go/coverage.out

  swift:
    name: Swift SDK
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sdk-swift
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -v

      - name: Run tests with coverage
        run: swift test --enable-code-coverage -v

      - name: Export coverage
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          XCTEST_PATH=$(find "${BIN_PATH}" -name '*.xctest' -type d | head -1)
          PROFDATA=$(find .build -name 'default.profdata' -type f | head -1)
          if [ -n "$XCTEST_PATH" ] && [ -n "$PROFDATA" ]; then
            EXEC_PATH="${XCTEST_PATH}/Contents/MacOS/$(basename "${XCTEST_PATH}" .xctest)"
            if [ -f "$EXEC_PATH" ]; then
              xcrun llvm-cov report "$EXEC_PATH" -instr-profile="$PROFDATA" -ignore-filename-regex='.build|Tests' | tee coverage-summary.txt
              xcrun llvm-cov export "$EXEC_PATH" -instr-profile="$PROFDATA" -format=lcov -ignore-filename-regex='.build|Tests' > coverage.lcov
            else
              echo "macOS xctest binary not found at $EXEC_PATH, trying direct binary"
              EXEC_PATH=$(find "${BIN_PATH}" -name 'DecibelSDKPackageTests' -type f ! -name '*.o' | head -1)
              if [ -n "$EXEC_PATH" ]; then
                xcrun llvm-cov report "$EXEC_PATH" -instr-profile="$PROFDATA" -ignore-filename-regex='.build|Tests' | tee coverage-summary.txt
                xcrun llvm-cov export "$EXEC_PATH" -instr-profile="$PROFDATA" -format=lcov -ignore-filename-regex='.build|Tests' > coverage.lcov
              else
                echo "No test binary found for coverage export"
              fi
            fi
          else
            echo "Coverage data not found"
          fi

      - name: Display coverage summary
        run: cat coverage-summary.txt 2>/dev/null || echo "No coverage summary available"

      - name: Upload Swift coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swift-coverage
          path: |
            sdk-swift/coverage-summary.txt
            sdk-swift/coverage.lcov

  kotlin:
    name: Kotlin SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-kotlin
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Run tests with JaCoCo coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload Kotlin JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-jacoco-report
          path: sdk-kotlin/build/reports/jacoco/

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [rust, go, swift, kotlin]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Rust:   ${{ needs.rust.result }}"
          echo "Go:     ${{ needs.go.result }}"
          echo "Swift:  ${{ needs.swift.result }}"
          echo "Kotlin: ${{ needs.kotlin.result }}"
          if [ "${{ needs.rust.result }}" != "success" ] || \
             [ "${{ needs.go.result }}" != "success" ] || \
             [ "${{ needs.swift.result }}" != "success" ] || \
             [ "${{ needs.kotlin.result }}" != "success" ]; then
            echo "One or more SDK tests failed!"
            exit 1
          fi
          echo "All SDK tests passed!"
