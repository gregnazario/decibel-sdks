name: CI

on:
  push:
    branches: [ main, "cursor/**" ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  python-v2:
    name: Python V2 SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: decibel-sdk-python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check decibel/ tests/

      - name: Type check
        run: mypy decibel/ --ignore-missing-imports || true

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --cov=decibel \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            -v

      - name: Upload Python coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: decibel-sdk-python/coverage.xml
          flags: python-v2
          name: python-v2-sdk
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-v2-coverage
          path: |
            decibel-sdk-python/coverage.xml
            decibel-sdk-python/htmlcov/

  rust-v2:
    name: Rust V2 SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-rust-v2
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk-rust-v2/target
          key: rust-v2-${{ hashFiles('sdk-rust-v2/Cargo.lock') }}
          restore-keys: rust-v2-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Measure coverage
        run: cargo tarpaulin --out xml --out html --output-dir coverage

      - name: Upload Rust V2 coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: sdk-rust-v2/coverage/cobertura.xml
          flags: rust-v2
          name: rust-v2-sdk
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-v2-coverage
          path: sdk-rust-v2/coverage/

  rust:
    name: Rust SDK (v1)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            sdk-rust/target
          key: rust-${{ hashFiles('sdk-rust/Cargo.lock') }}
          restore-keys: rust-

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Measure coverage
        run: cargo tarpaulin --out xml --output-dir coverage

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: sdk-rust/coverage/cobertura.xml
          flags: rust-v1
          name: rust-v1-sdk
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage
          path: sdk-rust/coverage/

  go:
    name: Go SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: sdk-go/go.sum

      - name: Build
        run: go build ./...

      - name: Run tests with coverage
        run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload Go coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: sdk-go/coverage.out
          flags: go
          name: go-sdk
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: sdk-go/coverage.out

  swift:
    name: Swift SDK
    runs-on: macos-latest
    defaults:
      run:
        working-directory: sdk-swift
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build -v

      - name: Run tests with coverage
        run: swift test --enable-code-coverage -v

      - name: Export coverage
        run: |
          BIN_PATH=$(swift build --show-bin-path)
          XCTEST_PATH=$(find "${BIN_PATH}" -name '*.xctest' -type d | head -1)
          PROFDATA=$(find .build -name 'default.profdata' -type f | head -1)
          if [ -n "$XCTEST_PATH" ] && [ -n "$PROFDATA" ]; then
            EXEC_PATH="${XCTEST_PATH}/Contents/MacOS/$(basename "${XCTEST_PATH}" .xctest)"
            if [ -f "$EXEC_PATH" ]; then
              xcrun llvm-cov report "$EXEC_PATH" -instr-profile="$PROFDATA" -ignore-filename-regex='.build|Tests' | tee coverage-summary.txt
              xcrun llvm-cov export "$EXEC_PATH" -instr-profile="$PROFDATA" -format=lcov -ignore-filename-regex='.build|Tests' > coverage.lcov
            else
              EXEC_PATH=$(find "${BIN_PATH}" -name 'DecibelSDKPackageTests' -type f ! -name '*.o' | head -1)
              if [ -n "$EXEC_PATH" ]; then
                xcrun llvm-cov report "$EXEC_PATH" -instr-profile="$PROFDATA" -ignore-filename-regex='.build|Tests' | tee coverage-summary.txt
                xcrun llvm-cov export "$EXEC_PATH" -instr-profile="$PROFDATA" -format=lcov -ignore-filename-regex='.build|Tests' > coverage.lcov
              else
                echo "No test binary found for coverage export"
              fi
            fi
          else
            echo "Coverage data not found"
          fi

      - name: Upload Swift coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: sdk-swift/coverage.lcov
          flags: swift
          name: swift-sdk
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Swift coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swift-coverage
          path: |
            sdk-swift/coverage-summary.txt
            sdk-swift/coverage.lcov

  kotlin:
    name: Kotlin SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-kotlin
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Run tests with JaCoCo coverage
        run: ./gradlew test jacocoTestReport

      - name: Upload Kotlin coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: sdk-kotlin/build/reports/jacoco/test/jacocoTestReport.xml
          flags: kotlin
          name: kotlin-sdk
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload Kotlin JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-jacoco-report
          path: sdk-kotlin/build/reports/jacoco/

  summary:
    name: Test & Coverage Summary
    runs-on: ubuntu-latest
    needs: [python-v2, rust-v2, rust, go, swift, kotlin]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "=== Test Results ==="
          echo "Python V2:  ${{ needs.python-v2.result }}"
          echo "Rust V2:    ${{ needs.rust-v2.result }}"
          echo "Rust V1:    ${{ needs.rust.result }}"
          echo "Go:         ${{ needs.go.result }}"
          echo "Swift:      ${{ needs.swift.result }}"
          echo "Kotlin:     ${{ needs.kotlin.result }}"
          echo ""
          echo "Coverage reports uploaded to Codecov (if CODECOV_TOKEN is set)"
          echo "View at: https://codecov.io/gh/${{ github.repository }}"
      - name: Fail if any job failed
        if: |
          needs.python-v2.result == 'failure' ||
          needs.rust-v2.result == 'failure' ||
          needs.rust.result == 'failure' ||
          needs.go.result == 'failure' ||
          needs.swift.result == 'failure' ||
          needs.kotlin.result == 'failure'
        run: |
          echo "One or more SDK tests failed!"
          exit 1
